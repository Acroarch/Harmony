<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Harmony{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; overflow: hidden; }
        .logo-gradient {
            background: linear-gradient(135deg, #6ea8fe, #75b798);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar { width: 240px; min-width: 240px; overflow-y: auto; }
        .nav-item-link {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 6px;
            text-decoration: none; color: #adb5bd;
            transition: background 0.15s, color 0.15s;
        }
        .nav-item-link:hover, .nav-item-link.active {
            background: rgba(255,255,255,0.07);
            color: #fff;
        }
        .nav-icon {
            width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #6ea8fe, #75b798);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }
        .section-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #6c757d;
            padding: 12px 12px 4px;
        }
        .main-panel { overflow-y: auto; min-height: 0; }
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body style="height:100vh; display:flex; flex-direction:column;">

    <!-- Top navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 flex-shrink-0">
        <span class="navbar-brand fw-bold logo-gradient fs-4">Harmony</span>
        <a href="/log_out/" class="btn btn-outline-danger btn-sm">Log Out</a>
    </nav>

    <!-- Body: sidebar + main panel -->
    <div class="d-flex flex-grow-1" style="min-height:0">

        <!-- Left sidebar -->
        <aside class="sidebar bg-dark border-end border-secondary p-2 d-flex flex-column gap-1">
            <div class="section-label">Servers</div>
            <a href="/server/" class="nav-item-link">
                <div class="nav-icon">🎵</div>
                <div>
                    <div class="fw-semibold" style="font-size:0.9rem">Harmony</div>
                    <div class="text-muted" style="font-size:0.75rem">General chat</div>
                </div>
            </a>

            <div class="section-label mt-2">Direct Messages</div>
            <a href="/friends/" class="nav-item-link">
                <div class="nav-icon">👥</div>
                <div>
                    <div class="fw-semibold" style="font-size:0.9rem">Friends</div>
                    <div class="text-muted" style="font-size:0.75rem">Your friends list</div>
                </div>
            </a>
        </aside>

        <!-- Right main panel -->
        <main class="main-panel flex-grow-1 d-flex flex-column">
            {% block content %}{% endblock %}
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Highlight the active sidebar link based on current path
        const path = window.location.pathname;
        document.querySelectorAll('.nav-item-link').forEach(link => {
            if (link.getAttribute('href') === path) link.classList.add('active');
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
