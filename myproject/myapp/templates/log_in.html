<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Harmony</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg p-4" style="width:100%;max-width:420px">
        <div class="card-body">
            <h1 class="fw-bold text-white fs-4 mb-3">Harmony</h1>
            <h2 class="card-title fw-bold mb-1">Welcome back!</h2>
            <p class="text-muted mb-4">Log in to your Harmony account</p>

            {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
            {% if success %}<div class="alert alert-success py-2">{{ success }}</div>{% endif %}

            <form method="POST" action="/log_in/">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="userName" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Log In</button>
            </form>
            <p class="text-center text-muted mt-3 mb-0 small">Need an account? <a href="/register/" class="text-primary">Sign Up</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
