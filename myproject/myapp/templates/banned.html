<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Harmony{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .logo-gradient {
            background: linear-gradient(135deg, #6ea8fe, #75b798);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar {
            width: 240px;
            min-width: 240px;
            overflow-y: auto;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #adb5bd;
            transition: background-color 0.15s, color 0.15s;
        }

        .nav-item-link:hover,
        .nav-item-link.active {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        .nav-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, #6ea8fe, #75b798);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6c757d;
            padding: 12px 12px 4px;
        }

        .main-panel {
            overflow-y: auto;
            min-height: 0;
        }


        .user-menu-item {
            display: block;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
            color: #fff;
            font-size: 0.85rem;
        }

        .user-menu-item:hover {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        .fp-btn {
            display: block; width: 100%; text-align: left;
            background: none; border: none; color: #fff;
            padding: 7px 10px; border-radius: 5px;
            font-size: 0.85rem; cursor: pointer;
        
        }
        .fp-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>

    
    <main>
        <h1>Don't ever come back, we don't want your business</h1>
        <p>Still Discord But Better, Yet You Can't!!</p>
        
    </main>

</body>
